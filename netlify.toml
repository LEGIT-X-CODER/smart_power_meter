[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Firebase client keys are PUBLIC by design (security = Firebase Rules, not hiding keys)
  # Tell Netlify's secret scanner to skip these
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_DATABASE_URL,VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET"
  # Exclude ESP32 firmware and seed script from scanning (not part of web build)
  SECRETS_SCAN_OMIT_PATHS = "esp32/,seed-demo-data.mjs,firebase-device-setup.json,firebase-test-data.json"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
